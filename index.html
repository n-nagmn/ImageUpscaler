<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upscaler</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    
    <script>
        if (window.tf) {
            try {
                tf.env().set('WEBGL_CONTEXT_ATTRIBUTES', { powerPreference: 'high-performance' });
            } catch(e) {
                console.warn("GPU setting error:", e);
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/upscaler@latest/dist/browser/umd/upscaler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/maxim-denoising@latest/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-thick@latest/dist/umd/2x.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-thick@latest/dist/umd/4x.min.js"></script>

    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 40px 20px; line-height: 1.5; color: #333; }
        h1 { font-size: 28px; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .desc { color: #666; font-size: 13px; margin-bottom: 30px; }
        .form-row { display: flex; padding: 15px 0; border-bottom: 1px dotted #ccc; }
        .form-label { width: 200px; font-weight: bold; flex-shrink: 0; }
        .radio-options label { margin-right: 15px; cursor: pointer; display: inline-block; }
        .hint { font-size: 11px; color: #999; display: block; margin-top: 5px; }
        .actions { margin-top: 30px; display: flex; gap: 10px; }
        .btn { padding: 12px 25px; cursor: pointer; border: 1px solid #ccc; background: #eee; border-radius: 4px; font-weight: bold; }
        .btn:hover { background: #ddd; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #statusMessage { margin-top: 15px; font-weight: bold; color: #d35400; }
        #outputContainer { margin-top: 40px; text-align: center; display: none; border-top: 2px solid #eee; padding-top: 20px; }
        #outputImage { max-width: 100%; border: 1px solid #000; margin-top: 10px; }
        #selectedFileName { margin-top: 10px; font-size: 14px; color: #0066cc; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Image Upscaler</h1>
    <div class="desc">ローカル環境で動作する超解像システム</div>

    <div class="form-row">
        <div class="form-label">画像選択:</div>
        <div class="form-content">
            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp">
            <div id="selectedFileName"></div>
        </div>
    </div>

    <div class="form-row">
        <div class="form-label">ノイズ除去:</div>
        <div class="form-content radio-options" id="noiseOptions">
            <label><input type="radio" name="noise" value="0" checked> なし</label>
            <label><input type="radio" name="noise" value="1"> 実行する</label>
            <span class="hint">※専用のAIモデルで事前にノイズを消去します。二段階になるため処理時間は長くなります。</span>
        </div>
    </div>

    <div class="form-row">
        <div class="form-label">アップスケール倍率:</div>
        <div class="form-content radio-options" id="scaleOptions">
            <label><input type="radio" name="scale" value="2" checked> 2x</label>
            <label><input type="radio" name="scale" value="4"> 4x</label>
        </div>
    </div>

    <div class="form-row">
        <div class="form-label">画像形式:</div>
        <div class="form-content radio-options">
            <label><input type="radio" name="format" value="image/png" checked> PNG</label>
            <label><input type="radio" name="format" value="image/webp"> WebP</label>
        </div>
    </div>

    <div class="actions">
        <button type="button" id="displayBtn" class="btn">ページに表示</button>
        <button type="button" id="downloadBtn" class="btn">保存</button>
    </div>
    
    <div id="statusMessage"></div>
    <div id="outputContainer">
        <h3>処理結果</h3>
        <img id="outputImage">
    </div>

    <script>
        window.onload = async function() {
            let denoiseUpscaler = null;
            let upscale2x = null;
            let upscale4x = null;

            function initModels() {
                try {
                    const denoiseModel = window.MaximDenoising || window.MaximDenoisingModel;
                    if (denoiseModel) {
                        denoiseUpscaler = new window.Upscaler({ model: denoiseModel });
                    }

                    upscale2x = new window.Upscaler({ model: window.ESRGANThick2x });
                    upscale4x = new window.Upscaler({ model: window.ESRGANThick4x });
                    
                    console.log("Models initialized successfully.");
                } catch (e) {
                    document.getElementById('statusMessage').textContent = "モデルの読み込みに失敗しました。詳細はコンソールをご確認ください。";
                    console.error(e);
                }
            }
            initModels();

            const fileInput = document.getElementById('imageInput');
            const fileNameDisplay = document.getElementById('selectedFileName');
            const statusMsg = document.getElementById('statusMessage');
            
            let currentImageObj = null;

            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) {
                    currentImageObj = null;
                    fileNameDisplay.textContent = "";
                    return;
                }

                fileNameDisplay.textContent = "選択中: " + file.name;

                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        currentImageObj = img;
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            async function processImage(type) {
                if (!currentImageObj) {
                    alert("画像を選択してください。");
                    return;
                }

                const btns = document.querySelectorAll('.btn');
                btns.forEach(b => b.disabled = true);
                statusMsg.textContent = "AIが画像を処理中です。重い処理のためしばらくお待ちください...";

                try {
                    const useNoiseReduction = document.querySelector('input[name="noise"]:checked').value === "1";
                    const scale = parseInt(document.querySelector('input[name="scale"]:checked').value);
                    const format = document.querySelector('input[name="format"]:checked').value;

                    let targetImage = currentImageObj;

                    if (useNoiseReduction && denoiseUpscaler) {
                        statusMsg.textContent = "ステップ1: ノイズ除去AIを実行中です...";
                        const denoisedData = await denoiseUpscaler.upscale(targetImage, { patchSize: 64, padding: 2 });
                        
                        const tempImg = new Image();
                        await new Promise((resolve) => {
                            tempImg.onload = resolve;
                            tempImg.src = denoisedData;
                        });
                        targetImage = tempImg;
                    }

                    statusMsg.textContent = "ステップ2: イラスト特化AIで拡大中です...";
                    const activeUpscaler = scale === 4 ? upscale4x : upscale2x;
                    const upscaledData = await activeUpscaler.upscale(targetImage, { patchSize: 64, padding: 2 });

                    const aiImg = new Image();
                    aiImg.onload = () => {
                        const finalCanvas = document.createElement('canvas');
                        finalCanvas.width = currentImageObj.width * scale;
                        finalCanvas.height = currentImageObj.height * scale;
                        const fCtx = finalCanvas.getContext('2d');
                        
                        fCtx.imageSmoothingEnabled = false;
                        fCtx.drawImage(aiImg, 0, 0, finalCanvas.width, finalCanvas.height);

                        const finalUrl = finalCanvas.toDataURL(format, 1.0);

                        if (type === 'display') {
                            const outImg = document.getElementById('outputImage');
                            outImg.src = finalUrl;
                            document.getElementById('outputContainer').style.display = 'block';
                            statusMsg.textContent = "処理が完了しました。下に表示しています。";
                        } else {
                            const a = document.createElement('a');
                            a.href = finalUrl;
                            a.download = `waifu2x_style_${Date.now()}.${format === 'image/webp' ? 'webp' : 'png'}`;
                            a.click();
                            statusMsg.textContent = "保存を開始しました。";
                        }
                        btns.forEach(b => b.disabled = false);
                    };
                    aiImg.src = upscaledData;

                } catch (e) {
                    console.error(e);
                    statusMsg.textContent = "エラーが発生しました: " + e.message;
                    btns.forEach(b => b.disabled = false);
                }
            }

            document.getElementById('displayBtn').onclick = () => processImage('display');
            document.getElementById('downloadBtn').onclick = () => processImage('download');
        };
    </script>
</body>
</html>
